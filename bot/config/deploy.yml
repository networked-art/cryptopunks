service: punks-bot

image: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>/punks-bot

# A worker, not a web service: it polls the indexer and tweets on a loop, so it
# exposes no port and opts out of the proxy (`proxy: false`, like the predictor).
# The container command comes from Dockerfile.bot's CMD (bin/run-loop).
servers:
  worker:
    hosts:
      - <%= ENV["DEPLOY_HOST"] %>
    proxy: false
    options:
      network: shared

primary_role: worker

registry:
  username: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: ..
  dockerfile: ../Dockerfile.bot

env:
  clear:
    INDEXER_URL: <%= ENV["INDEXER_URL"] %>
    POLL_INTERVAL: <%= ENV["POLL_INTERVAL"] %>
    # One-time backfill seed: on the first run (empty volume) the bot starts from
    # this unix timestamp instead of "now". Ignored once the cursor is persisted.
    START_TIMESTAMP: <%= ENV["START_TIMESTAMP"] %>
  secret:
    - TWITTER_API_KEY
    - TWITTER_API_SECRET
    - TWITTER_ACCESS_TOKEN
    - TWITTER_ACCESS_SECRET
    - RPC_URL

# Persist the sales cursor across deploys.
volumes:
  - /var/lib/punks-bot:/app/data

ssh:
  user: root
