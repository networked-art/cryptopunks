# Legacy hosts — permanent redirect to the canonical host.
server {
  listen 80;
  server_name docs.punksmarket.app docs.punks.auction;

  return 301 https://cryptopunks.networked.art$request_uri;
}

# Canonical host (also the default server, so kamal-proxy healthchecks
# and any unmatched host are served the docs).
server {
  listen 80 default_server;
  server_name cryptopunks.networked.art;

  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  error_page 404 /404.html;

  location = /404.html {
    internal;
  }
}
