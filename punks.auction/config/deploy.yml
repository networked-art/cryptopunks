service: punks-auction

image: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>/punks-auction

servers:
  web:
    hosts:
      - <%= ENV["DEPLOY_HOST"] %>
    options:
      network: shared

proxy:
  ssl: true
  hosts:
    - <%= ENV["APP_HOST"] %>
  app_port: 3000
  healthcheck:
    path: /
    interval: 5
    timeout: 30

registry:
  username: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  context: ..
  dockerfile: ../Dockerfile.punks.auction

env:
  clear:
    NUXT_PUBLIC_INDEXER_URL: <%= ENV["NUXT_PUBLIC_INDEXER_URL"] %>
    # Site origin for nuxt-site-config (used by nuxt-og-image for absolute URLs).
    NUXT_SITE_URL: <%= ENV["NUXT_SITE_URL"] %>
    # Cap Nitro's node-cluster preset at 4 workers (default = one per CPU).
    NITRO_CLUSTER_WORKERS: '4'
  secret:
    - NUXT_RPC_URL
    - NUXT_PUBLIC_EVM_WALLET_CONNECT_PROJECT_ID
    - NUXT_PUBLIC_PUBLIC_URL

ssh:
  user: root
